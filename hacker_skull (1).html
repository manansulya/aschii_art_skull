// ====================================================================

const canvas = document.getElementById('c');

let W, H;

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
}

// ====================================================================
//  AUDIO
// ====================================================================
function buildAudio() {
  const ac = new (window.AudioContext || window.webkitAudioContext)();
  const sr = ac.sampleRate;
  const len = sr * 4;
  const buf = ac.createBuffer(1, len, sr);
  const d   = buf.getChannelData(0);
  let last = 0;
  for (let i = 0; i < len; i++) {
    last = (last + 0.02*(Math.random()*2-1)) / 1.02;
    d[i] = Math.max(-1, Math.min(1,
      last * 3.5
      + Math.sin(2*Math.PI*38*i/sr)*0.035
      + Math.sin(2*Math.PI*56*i/sr)*0.02
    ));
  }
  const src = ac.createBufferSource();
  src.buffer = buf; src.loop = true;
  const g = ac.createGain(); g.gain.value = 0.13;
  src.connect(g); g.connect(ac.destination); src.start();

  function tick() {
    if (Math.random() < 0.38) {
      const osc = ac.createOscillator();
      const gn  = ac.createGain();
      osc.type = Math.random()<0.5 ? 'sawtooth' : 'square';
      osc.frequency.value = 55 + Math.random()*450;
      gn.gain.setValueAtTime(0.065, ac.currentTime);
      gn.gain.exponentialRampToValueAtTime(0.001, ac.currentTime+0.1);
      osc.connect(gn); gn.connect(ac.destination);
      osc.start(); osc.stop(ac.currentTime+0.1);
    }
    setTimeout(tick, 450 + Math.random()*900);
  }
  tick();
}

// ====================================================================
//  RAIN
// ====================================================================
const streams = [];

function initRain() {
  streams.length = 0;
  const cols = Math.floor(W / CFG.fontSize);
  for (let c = 0; c < cols; c++) {
    streams.push({
      x: c * CFG.fontSize,
      y: Math.random() * -H,
      speed: 1.5 + Math.random() * 2.8,
      len: 10 + Math.floor(Math.random() * 22),
      chars: [],
    });
  }
}

function drawRain(alpha) {
  if (alpha <= 0) return;
  for (const s of streams) {
    for (let i = 0; i < s.len; i++) {
      if (!s.chars[i]) s.chars[i] = rc(CFG.rainChars);
      if (Math.random() < 0.04) s.chars[i] = rc(CFG.rainChars);
      const py = s.y - i * CFG.fontSize;
      if (py < -CFG.fontSize || py > H + 4) continue;
      const fade = i === 0 ? 1 : Math.pow(1 - i/s.len, 1.5);
      ctx.globalAlpha = fade * alpha;
      ctx.fillStyle   = i === 0 ? '#ffcc88' : '#c87941';
      ctx.fillText(s.chars[i], s.x, py);
    }
    s.y += s.speed;
    if (s.y - s.len * CFG.fontSize > H) {
      s.y = -Math.random() * H * 0.5;
      s.speed = 1.5 + Math.random() * 2.8;
    }
  }
  ctx.globalAlpha = 1;
}

// ====================================================================
//  PARTICLES
// ====================================================================
let particles  = [];
let figTargets = [];

function buildFigureTargets() {
  figTargets = [];
  const cw = CFG.fontSize;
  const ch = CFG.fontSize;
  // Center the 80x80 grid on the canvas
  const ox = Math.floor((W - GRID_W * cw) / 2);
  const oy = Math.floor((H - GRID_H * ch) / 2);

  for (const [row, col, bright, R, G, B] of FIGURE_DATA) {
    figTargets.push({
      tx: ox + col * cw,
      ty: oy + row * ch,
      bright, R, G, B,
      char: rc(CFG.figChars),
    });
  }
}

function spawnParticles() {
  // Cap at 2200 for performance
  let pts = figTargets;
  if (pts.length > 2200) {
    const step = pts.length / 2200;
    pts = pts.filter((_, i) => Math.round(i/step) !== Math.round((i-1)/step));
  }
  particles = pts.map(t => ({
    x: Math.random() * W,
    y: Math.random() * H,
    tx: t.tx, ty: t.ty,
    vx: 0, vy: 0,
    char: t.char,
    R: t.R, G: t.G, B: t.B,
    bright: t.bright,
    arrived: false,
    colorT: 0,
    alpha: 0.5 + Math.random() * 0.5,
    delay: Math.floor(Math.random() * 20),
  }));
}

function updateParticles(frame) {
  let settled = 0;
  for (const p of particles) {
    if (p.delay > 0) { p.delay--; continue; }
    const dx = p.tx - p.x;
    const dy = p.ty - p.y;
    const dist = Math.hypot(dx, dy);
    if (dist < 1.2) {
      p.x = p.tx; p.y = p.ty;
      p.arrived = true;
      settled++;
    } else {
      // Stronger attraction for faster formation
      const ease = 0.09 + 0.025 * Math.sin(frame * 0.038 + p.ty * 0.001);
      p.vx = (p.vx + dx*ease)*0.70 + (Math.random()-0.5)*0.8;
      p.vy = (p.vy + dy*ease)*0.70 + (Math.random()-0.5)*0.8;
      p.x += p.vx; p.y += p.vy;
      if (Math.random() < 0.025) p.char = rc(CFG.figChars);
    }
    p.colorT = Math.min(1, p.colorT + 0.018);
  }
  return settled >= particles.length * 0.97;
}

function drawParticles() {
  for (const p of particles) {
    // Lerp from green-rain to the figure's actual copper/orange color
    const t = p.colorT;
    const r = Math.round(lerp(0xc8, p.R, t));
    const g = Math.round(lerp(0x79, p.G, t));
    const b = Math.round(lerp(0x41, p.B, t));
    ctx.fillStyle   = `rgb(${r},${g},${b})`;
    ctx.globalAlpha = p.alpha;
    ctx.fillText(p.char, p.x, p.y);
  }
  ctx.globalAlpha = 1;
}

function drawFigureStatic(pulse) {
  const cw = CFG.fontSize;
  const ch = CFG.fontSize;
  const ox = Math.floor((W - GRID_W*cw) / 2);
  const oy = Math.floor((H - GRID_H*ch) / 2);

  const breathe = 1 + 0.003 * Math.sin(pulse * Math.PI * 2);

  for (const t of figTargets) {
    // Parallax
    const px = t.tx + CFG.parX * 0.016;
    const py = t.ty + CFG.parY * 0.016;
    // Normalize brightness to alpha (brighter = more opaque)
    const normBright = t.bright / 114; // max brightness ~114
    const breathAlpha = normBright * (0.85 + 0.15*Math.sin(pulse*6.28));
    ctx.fillStyle   = `rgb(${t.R},${t.G},${t.B})`;
    ctx.globalAlpha = Math.min(1, breathAlpha * 1.15);
    ctx.fillText(t.char, px, py);
  }
  ctx.globalAlpha = 1;
}

// ====================================================================
//  GLITCH
// ====================================================================
function glitchPass() {
  if (Math.random() > 0.032) return;
  const n = 1 + Math.floor(Math.random()*5);
  for (let i = 0; i < n; i++) {
    const y  = Math.random() * H;
    const h  = 1 + Math.random() * 5;
    const sh = (Math.random()-0.5) * 30;
    try {
      const d = ctx.getImageData(0, y, W, h);
      ctx.putImageData(d, sh, y);
    } catch(e){}
  }
}

// ====================================================================
//  TEXT REVEAL
// ====================================================================
const MSG = 'hello friend...\n\nlook behind you.';
let txt = { active:false, startFrame:0, settled:{} };
function startText(f) { txt.active=true; txt.startFrame=f; }

function drawTextReveal(frame) {
  if (!txt.active) return;
  const elapsed = frame - txt.startFrame;
  const lines   = MSG.split('\n');
  const flat    = MSG.replace(/\n/g,'');
  const speed   = 2.3;
  const revealed= Math.min(flat.length, Math.floor(elapsed/speed));

  const cw = CFG.fontSize;
  const ch = CFG.fontSize;
  const figRight = Math.floor((W - GRID_W*cw)/2) + GRID_W*cw;
  const bx = figRight + Math.max(16, W*0.025);
  const by = (H - GRID_H*ch)/2 + GRID_H*ch * 0.3;
  const lh = (CFG.fontSize + 3) * 1.85;

  ctx.font = `${CFG.fontSize+1}px 'Courier New',monospace`;
  ctx.shadowBlur = 0;

  let ci = 0;
  for (let li = 0; li < lines.length; li++) {
    const line = lines[li];
    let out = '';
    for (let col = 0; col < line.length; col++) {
      if (ci >= revealed) break;
      const key = `${li}-${col}`;
      const age = elapsed - ci*speed;
      if (!txt.settled[key] && age > 10) txt.settled[key] = true;
      out += txt.settled[key] ? line[col] : rc('!@#$%^&*<>?0123456789ABCDEFabcdef');
      ci++;
    }
    if (!out && !line) { ci++; continue; }
    const flick = 0.72 + 0.28*Math.sin(frame*0.1+li);
    ctx.globalAlpha = flick;
    ctx.fillStyle   = '#c87941';
    ctx.fillText(out, bx, by + li*lh);
  }
  ctx.globalAlpha = 1;
}

// ====================================================================
//  MAIN LOOP
// ====================================================================
let frame  = 0;
let pulseT = 0;

function loop() {
  requestAnimationFrame(loop);
  frame++;
  pulseT += 0.007;

  // Parallax
  CFG.parX += (CFG.mouseX - W/2 - CFG.parX) * 0.05;
  CFG.parY += (CFG.mouseY - H/2 - CFG.parY) * 0.05;

  // Zoom
  if (CFG.phase !== 'RAIN') {
    CFG.zoom += (CFG.zoomTarget - CFG.zoom) * 0.0022;
  }

  // Draw
  ctx.save();
  if (CFG.zoom !== 1) {
    ctx.translate(W/2, H/2);
    ctx.scale(CFG.zoom, CFG.zoom);
    ctx.translate(-W/2, -H/2);
  }

  const fade = CFG.phase==='RAIN' ? 0.15 : CFG.phase==='FORMING' ? 0.19 : 0.28;
  ctx.fillStyle = `rgba(0,0,0,${fade})`;
  ctx.fillRect(-W, -H, W*3, H*3);

  ctx.font         = `${CFG.fontSize}px 'Courier New',monospace`;
  ctx.textBaseline = 'top';

  if (CFG.phase === 'RAIN') {
    drawRain(1);
    CFG.phaseTimer++;
    if (CFG.phaseTimer > 190) {
      CFG.phase = 'FORMING';
      buildFigureTargets();
      spawnParticles();
      CFG.phaseTimer = 0;
    }
  }
  else if (CFG.phase === 'FORMING') {
    drawRain(Math.max(0, 1 - CFG.phaseTimer/65));
    const done = updateParticles(frame);
    drawParticles();
    CFG.phaseTimer++;
    if (done || CFG.phaseTimer > 200) {
      CFG.phase = 'FORMED';
      CFG.phaseTimer = 0;
    }
  }
  else if (CFG.phase === 'FORMED') {
    drawFigureStatic(pulseT);
    CFG.phaseTimer++;
    if (CFG.phaseTimer > 180) {   // exactly 3 seconds at 60fps
      CFG.phase = 'TEXT';
      startText(frame);
    }
  }
  else if (CFG.phase === 'TEXT') {
    drawFigureStatic(pulseT);
    drawTextReveal(frame);
  }

  glitchPass();
  ctx.restore();
}

// ====================================================================
//  INPUT
// ====================================================================
window.addEventListener('mousemove', e => {
  CFG.mouseX = e.clientX;
  CFG.mouseY = e.clientY;
});

// ====================================================================
//  START
// ====================================================================
function startExperience() {
  const scr = document.getElementById('startScreen');
  scr.style.opacity = '0';
  scr.style.pointerEvents = 'none';
  setTimeout(() => scr.remove(), 1000);
  try { buildAudio(); } catch(e){}
  initRain();
  loop();
}

function rc(set) { return set[Math.floor(Math.random()*set.length)]; }
function lerp(a,b,t) { return a+(b-a)*t; }
</script>
